name: Matrix example
on: 
  push:
  pull_request: 
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chrome,edge]
        os: [ubuntu-latest,windows-latest]
    steps:
      - name: show browser
        run: echo "running on ${{matrix.browser}}"
      - name: show os
        run: echo "running on ${{matrix.os}}"
