name: Playwright test
on: 
  push: 
  pull_request: 
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: SetUp java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install dependencies
        run: mvn compile
      - name: Run test
        run: mvn -DsuiteXmlFile=testng.xml
